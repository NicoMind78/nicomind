<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicoMind – Anmelden</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1d1d1f;
    --text2: #6e6e73;
    --accent: #0071e3;
    --radius: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,113,227,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,113,227,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: 0 4px 60px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06);
    padding: 44px 48px 40px;
    width: 380px;
    max-width: 94vw;
    position: relative;
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo + Brand */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }

  .brand-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.4px;
    color: var(--text);
  }
  .brand-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
  }

  /* Form */
  .form-group { margin-bottom: 14px; }

  .input-wrap {
    position: relative;
  }
  .input-wrap svg {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--text2); pointer-events: none;
  }
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border .15s, background .15s;
    font-family: inherit;
    -webkit-font-smoothing: antialiased;
  }
  input:focus {
    border-color: var(--accent);
    background: #fff;
  }
  input::placeholder { color: #b0b0b5; }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    font-family: inherit;
    letter-spacing: -0.1px;
    transition: all .15s;
  }
  .btn-login:hover { background: #0077ed; box-shadow: 0 2px 12px rgba(0,113,227,.35); }

  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0 16px;
    color: var(--text2); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .coming-soon {
    text-align: center;
    font-size: 12px;
    color: var(--text2);
    padding: 10px 14px;
    background: rgba(0,113,227,.06);
    border-radius: 8px;
    border: 1px solid rgba(0,113,227,.14);
    line-height: 1.5;
  }
  .coming-soon strong { color: var(--accent); font-weight: 600; }

  /* Forgot link */
  .forgot {
    display: block;
    text-align: right;
    font-size: 12.5px;
    color: var(--accent);
    text-decoration: none;
    margin-top: 6px;
    opacity: .6;
    cursor: default;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    font-size: 11.5px;
    color: var(--text2);
    text-align: center;
    line-height: 1.6;
    animation: fadeUp .5s .1s ease both;
  }
  .footer a { color: var(--accent); text-decoration: none; opacity: .7; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-name">NicoMind</div>
    <div class="brand-sub">Intelligente Dienstplanung</div>
  </div>


  <div class="form-group">
    <div class="input-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      <input type="email" id="emailInput" placeholder="E-Mail-Adresse">
    </div>
  </div>

  <div class="form-group">
    <div class="input-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <input type="password" id="passwordInput" placeholder="Passwort">
    </div>
    <a href="#" class="forgot">Passwort vergessen?</a>
  </div>

  <div id="errorMsg" style="color:#c0002a;font-size:12.5px;margin-bottom:10px;display:none;text-align:center"></div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Anmelden</button>

</div>

<div class="footer">
  © 2026 NicoMind &nbsp;·&nbsp; <a href="#">Datenschutz</a> &nbsp;·&nbsp; <a href="#">Nutzungsbedingungen</a>
</div>

<script>
const sb = supabase.createClient(
  'https://pxztxkqzvjkwvbfymbst.supabase.co',
  'sb_publishable_bpKLnvsUQYffH7XEQay1Bg_Y__1XWEL'
);

// Check if already logged in
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='dienstplan.html';
});

async function doLogin(){
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if(!email || !password){
    err.textContent = 'Bitte E-Mail und Passwort eingeben.';
    err.style.display = 'block'; return;
  }

  btn.textContent = '…';
  btn.style.opacity = '.7';
  err.style.display = 'none';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    err.textContent = 'Ungültige E-Mail oder Passwort.';
    err.style.display = 'block';
    btn.textContent = 'Anmelden';
    btn.style.opacity = '1';
  } else {
    window.location.href = 'dienstplan.html';
  }
}

// Enter key support
document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
